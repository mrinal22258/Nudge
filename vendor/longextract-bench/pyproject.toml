[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "longextract-bench"
version = "0.1.0"
description = "LongExtractBench — an independent, vendor-neutral benchmark for structured extraction from long documents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Micro1" }]
keywords = ["benchmark", "document-extraction", "structured-extraction", "json-schema", "llm", "evaluation"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "httpx>=0.27",
    "huggingface_hub>=0.23",
]

[project.optional-dependencies]
# SDK-backed providers. Install only what you intend to run; the harness imports
# each provider lazily, so a missing SDK only blocks that one provider.
providers = [
    "anthropic>=0.40",
    "extend-ai>=1.12",
]
dotenv = ["python-dotenv>=1.0"]

[project.urls]
Homepage = "https://github.com/micro1-research/longextract-bench"
Repository = "https://github.com/micro1-research/longextract-bench"

[project.scripts]
lxbench-run = "longextract_bench.cli:run_main"
lxbench-grade = "longextract_bench.cli:grade_main"
lxbench-report = "longextract_bench.cli:report_main"

[tool.hatch.build.targets.wheel]
packages = ["src/longextract_bench"]
